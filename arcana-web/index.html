<!doctype html>
<!-- ============================================================
     index.html — pasta RAIZ do projeto (fora do src)
     Este e o UNICO arquivo HTML do projeto.
     O React injeta tudo dentro da div id="root".
     Voce raramente vai editar este arquivo.
     SUBSTITUI o index.html que o Vite gerou.
     ============================================================ -->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabrera — por Selene</title>

    <!-- Bootstrap via CDN: carrega o CSS do Bootstrap da internet -->
    <!-- Usamos so as classes utilitarias quando precisar -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>

    <!-- O React injeta toda a aplicacao aqui -->
    <div id="root"></div>

    <!-- Bootstrap JS: necessario para componentes interativos -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    <!-- Script do Vite que carrega o React -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
